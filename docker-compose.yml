services:
  postgres:
    profiles: ["full"]
    image: postgres:15-alpine
    container_name: smith_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-smith_project}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-smith_project}"]
      interval: 5s
      timeout: 5s
      retries: 5

  smith-api:
    build: .
    container_name: smith_api
    restart: always
    env_file: .env
    ports:
      - "8000:8000"

  n8n:
    profiles: ["full"]
    image: docker.n8n.io/n8nio/n8n
    container_name: smith_n8n
    restart: always
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Sao_Paulo
    ports:
      - "5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
      smith-api:
        condition: service_started
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:
